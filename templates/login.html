{% extends "base.html" %}

{% block content %}
<div class="auth-container fade-in">
    <div class="auth-header">
        <h2>Welcome Back</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem;">Sign in to continue to Planterra</p>
    </div>

    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('signup') }}">Sign up here</a>
    </div>
</div>
{% endblock %}
